<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Trực Tuyến</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0eacc, #6e8894);
        }

        .calculator {
            background-color: #171c22;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 350px;
        }

        .display {
            width: 100%;
            height: 100px;
            background-color: #222933;
            border: none;
            border-radius: 20px;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 20px;
            pointer-events: none;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: #2d3748;
            color: #ffffff;
            aspect-ratio: 1;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Nút chức năng xóa (C) */
        button.clear {
            background-color: #e53e3e;
            color: white;
        }

        /* Các nút phép toán (+, -, *, /) */
        button.operator {
            background-color: #ed8936;
            color: white;
        }

        /* Nút bằng (=) */
        button.equal {
            background-color: #38a169;
            color: white;
            grid-column: span 1;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="result" value="0" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">x</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="backspace()">⌫</button>
            <button class="equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('result');
        let isCalculated = false;

        function appendValue(val) {
            if (display.value === '0' && val !== '.' || isCalculated) {
                if(isCalculated && (val === '+' || val === '-' || val === '*' || val === '/')) {
                    isCalculated = false;
                } else {
                    display.value = '';
                    isCalculated = false;
                }
            }
            display.value += val;
        }

        function clearDisplay() {
            display.value = '0';
            isCalculated = false;
        }

        function backspace() {
            if (display.value.length > 1) {
                display.value = display.value.slice(0, -1);
            } else {
                display.value = '0';
            }
        }

        function calculate() {
            try {
                // Thay thế các ký tự hiển thị để tính toán chính xác trong JS
                let expression = display.value;
                let result = eval(expression);
                
                // Giới hạn làm tròn số thập phân để tránh lỗi hiển thị vô hạn
                if (result % 1 !== 0) {
                    result = parseFloat(result.toFixed(8));
                }
                
                display.value = result;
                isCalculated = true;
            } catch (error) {
                display.value = 'Lỗi';
                isCalculated = true;
            }
        }
    </script>
</body>
</html>
