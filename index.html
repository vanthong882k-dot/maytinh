<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Máy Tính Trực Tuyến</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f2f5;
        }

        .calculator {
            background-color: #171c22;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 350px;
        }

        .display {
            width: 100%;
            height: 100px;
            background-color: #222933;
            border: none;
            border-radius: 20px;
            margin-bottom: 30px;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 20px;
            word-wrap: break-word;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            padding: 20px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            font-weight: 600;
            cursor: pointer;
            background-color: #2d3748;
            color: #ffffff;
            aspect-ratio: 1;
        }

        button:active {
            transform: scale(0.95);
        }

        button.clear {
            background-color: #e53e3e;
        }

        button.operator {
            background-color: #ed8936;
        }

        button.equal {
            background-color: #38a169;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" class="display" id="result" value="0" readonly>
        <div class="buttons" id="btnContainer">
            <button class="clear" data-type="clear">C</button>
            <button data-type="input">(</button>
            <button data-type="input">)</button>
            <button class="operator" data-type="input">/</button>

            <button data-type="input">7</button>
            <button data-type="input">8</button>
            <button data-type="input">9</button>
            <button class="operator" data-type="input">*</button>

            <button data-type="input">4</button>
            <button data-type="input">5</button>
            <button data-type="input">6</button>
            <button class="operator" data-type="input">-</button>

            <button data-type="input">1</button>
            <button data-type="input">2</button>
            <button data-type="input">3</button>
            <button class="operator" data-type="input">+</button>

            <button data-type="input">0</button>
            <button data-type="input">.</button>
            <button data-type="backspace">⌫</button>
            <button class="equal" data-type="equal">=</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const display = document.getElementById('result');
            const container = document.getElementById('btnContainer');
            let isCalculated = false;

            container.addEventListener('click', (e) => {
                const target = e.target;
                if (!target.matches('button')) return;

                const type = target.dataset.type;
                const value = target.innerText;

                if (type === 'clear') {
                    display.value = '0';
                    isCalculated = false;
                } 
                else if (type === 'backspace') {
                    if (display.value.length > 1) {
                        display.value = display.value.slice(0, -1);
                    } else {
                        display.value = '0';
                    }
                } 
                else if (type === 'equal') {
                    try {
                        let result = eval(display.value);
                        if (result % 1 !== 0) {
                            result = parseFloat(result.toFixed(8));
                        }
                        display.value = result;
                        isCalculated = true;
                    } catch (err) {
                        display.value = 'Lỗi';
                        isCalculated = true;
                    }
                } 
                else if (type === 'input') {
                    let actualValue = value === 'x' ? '*' : value;
                    
                    if (display.value === '0' && actualValue !== '.' || isCalculated) {
                        if (isCalculated && ['+', '-', '*', '/'].includes(actualValue)) {
                            isCalculated = false;
                        } else {
                            display.value = '';
                            isCalculated = false;
                        }
                    }
                    display.value += actualValue;
                }
            });
        });
    </script>
</body>
</html>
