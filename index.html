<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo: trip planning</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #fdfaf2;
            color: #4a3f35;
            padding: 10px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        h2 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 15px;
            color: #2c251e;
        }
        .rows-list {
            display: flex;
            flex-direction: column;
            gap: 8px; /* Giảm khoảng cách giữa các hàng cho khít hơn */
            margin-bottom: 15px;
        }
        .row-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        /* Ô ghi chú note */
        .row-note-input {
            width: 80px;
            padding: 4px 0;
            font-size: 0.8rem;
            border: none;
            background-color: transparent;
            color: #4a3f35;
            font-weight: 500;
            outline: none;
            border-bottom: 1px dashed transparent;
            transition: border-color 0.2s;
        }
        .row-note-input:focus, .row-note-input:hover {
            border-bottom-color: #bfa88f;
        }
        .input-container {
            flex: 1;
        }
        /* 🚀 ĐÃ GIẢM THÊM 30% CHIỀU CAO Ô NHẬP SỐ */
        .row-input {
            width: 100%;
            padding: 6px 12px; /* Giảm từ 9px xuống 6px giúp ô nhập siêu mỏng */
            font-size: 1.05rem; /* Giữ nguyên size chữ 75% thanh mảnh */
            border: 1.5px solid #e6dfd3;
            border-radius: 6px; /* Bo góc nhẹ cho hợp với chiều cao mỏng */
            background-color: #ffffff;
            color: #2c251e;
            outline: none;
            -webkit-appearance: none;
        }
        .row-input:focus {
            border-color: #bfa88f;
            box-shadow: 0 0 0 2px rgba(191, 168, 143, 0.15);
        }
        /* Vùng hiển thị kết quả */
        .result-container {
            display: flex;
            align-items: center;
            gap: 4px;
            min-width: 110px;
            justify-content: flex-end;
        }
        .row-result {
            font-size: 1rem;
            color: #b35d5d;
            font-weight: bold;
            text-align: right;
            word-break: break-all;
        }
        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px; /* Tinh chỉnh nhẹ vùng bấm cho vừa vặn hàng mỏng */
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .copy-btn.visible {
            opacity: 0.5;
            pointer-events: auto;
        }
        .copy-btn:hover {
            opacity: 1 !important;
        }
        .copy-btn svg {
            width: 15px; /* Thu nhỏ nhẹ icon copy */
            height: 15px;
            fill: #8c8275;
        }
        .add-row-btn {
            background: none;
            border: none;
            color: #bfa88f;
            font-size: 0.85rem;
            cursor: pointer;
            padding: 10px 0;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .add-row-btn:hover {
            color: #947a61;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📁 Demo: trip planning</h2>
    
    <div class="rows-list" id="rowsContainer">
        <!-- Tự động dựng từ JS -->
    </div>

    <button class="add-row-btn" onclick="addNewRow()">+ add row</button>
</div>

<script>
    let rowData = [
        { note: "", formula: "3159*5" },
        { note: "", formula: "" },
        { note: "NA SA", formula: "R1*72" },
        { note: "AS", formula: "R1*70" },
        { note: "EU IM", formula: "R1*68" }
    ];

    const rowsContainer = document.getElementById('rowsContainer');

    function buildInitialDOM() {
        rowsContainer.innerHTML = '';
        rowData.forEach((row, index) => {
            createRowDOM(index, row.note, row.formula);
        });
        calculateAll();
    }

    function createRowDOM(index, noteValue, formulaValue) {
        let rowId = `R${index + 1}`;
        const rowItem = document.createElement('div');
        rowItem.className = 'row-item';
        rowItem.id = `row-item-${index}`;
        rowItem.innerHTML = `
            <input type="text" class="row-note-input" id="note-${index}" 
                   value="${noteValue}" oninput="onNoteChange(${index}, this.value)" placeholder="${rowId}">
            <div class="input-container">
                <input type="text" class="row-input" id="formula-${index}" 
                       value="${formulaValue}" oninput="onFormulaChange(${index}, this.value)" placeholder="Nhập phép tính...">
            </div>
            <div class="result-container">
                <span class="row-result" id="result-${index}"></span>
                <button class="copy-btn" id="copy-btn-${index}" title="Copy">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        `;
        rowsContainer.appendChild(rowItem);
    }

    function calculateAll() {
        let computedValues = {};

        for (let i = 0; i < rowData.length; i++) {
            let rowId = `R${i + 1}`;
            let rawFormula = rowData[i].formula.trim();
            let resultSpan = document.getElementById(`result-${i}`);
            let copyBtn = document.getElementById(`copy-btn-${i}`);

            if (!rawFormula) {
                computedValues[rowId] = "";
                if(resultSpan) resultSpan.innerText = "";
                if(copyBtn) {
                    copyBtn.classList.remove('visible');
                    copyBtn.onclick = null;
                }
                continue;
            }

            try {
                let cleanFormula = rawFormula.replace(/×/g, '*').replace(/÷/g, '/');

                for (let prevId in computedValues) {
                    if (computedValues[prevId] !== "") {
                        let regex = new RegExp('\\b' + prevId + '\\b', 'g');
                        cleanFormula = cleanFormula.replace(regex, computedValues[prevId]);
                    }
                }

                let evalResult = eval(cleanFormula);
                
                if (typeof evalResult === 'number' && !isNaN(evalResult)) {
                    computedValues[rowId] = evalResult;
                    
                    let formatted = evalResult.toLocaleString('en-US', { maximumFractionDigits: 4 });
                    if(resultSpan) resultSpan.innerText = formatted;
                    
                    if(copyBtn) {
                        copyBtn.classList.add('visible');
                        let cleanNum = formatted.replace(/,/g, '');
                        copyBtn.onclick = () => copyToClipboard(cleanNum);
                    }
                } else {
                    computedValues[rowId] = "";
                    if(resultSpan) resultSpan.innerText = "";
                    if(copyBtn) {
                        copyBtn.classList.remove('visible');
                        copyBtn.onclick = null;
                    }
                }
            } catch (e) {
                computedValues[rowId] = "Lỗi";
                if(resultSpan) resultSpan.innerText = "Lỗi";
                if(copyBtn) {
                    copyBtn.classList.remove('visible');
                    copyBtn.onclick = null;
                }
            }
        }
    }

    function onNoteChange(index, value) {
        rowData[index].note = value;
    }

    function onFormulaChange(index, value) {
        rowData[index].formula = value;
        calculateAll();
    }

    function addNewRow() {
        let newIndex = rowData.length;
        rowData.push({ note: "", formula: "" });
        createRowDOM(newIndex, "", "");
        calculateAll();
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            console.log(`Đã copy số: ${text}`);
        }).catch(err => {
            console.error('Lỗi copy: ', err);
        });
    }

    buildInitialDOM();
</script>

</body>
</html>
